name: Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  secrets:
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: read }
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    container: { image: returntocorp/semgrep }
    steps:
      - uses: actions/checkout@v5
      - name: semgrep
        # Non-blocking: warn on findings rather than failing the workflow.
        run: |
          if semgrep ci; then
            echo "✅ semgrep: no findings" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::semgrep reported findings or errored (non-blocking — see log above)"
            echo "⚠️ semgrep: findings or error — see job log" >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
