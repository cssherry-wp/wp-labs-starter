name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      bash-tests: ${{ steps.filter.outputs.bash-tests }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'plugins/wp-labs-sdlc/skills/session-dashboard/**'
              - 'plugins/wp-labs-sdlc/skills/scaffolding-sdlc/templates/claude/session-dashboard.html'
            bash-tests:
              - '**/test-*'
              - '**/*.test.sh'
              - '**/*.jq'

  python-lint:
    name: Python lint & typecheck (session-dashboard)
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    defaults:
      run:
        working-directory: plugins/wp-labs-sdlc/skills/session-dashboard/tests
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check
      - run: uv run mypy .

  dashboard:
    name: Playwright (session-dashboard)
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    defaults:
      run:
        working-directory: plugins/wp-labs-sdlc/skills/session-dashboard/tests
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run playwright install chromium --with-deps
      - run: uv run pytest

  bash-tests:
    name: Bash tests
    needs: changes
    if: needs.changes.outputs.bash-tests == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - name: Run all bash test scripts
        run: |
          find . \( -name '*.test.sh' -o -name 'test-*' \) \
            -type f -not -name '*.md' \
            -not -path './.claude/*' \
            -not -path './feature/*' \
            -not -path '*/templates/*' \
            -not -path '*/.venv/*' \
            | sort \
            | while read -r f; do
                echo "::group::$f"
                bash "$f"
                echo "::endgroup::"
              done
