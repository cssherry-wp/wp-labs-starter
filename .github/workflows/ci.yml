name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      bash-tests: ${{ steps.filter.outputs.bash-tests }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'plugins/wp-labs-sdlc/skills/session-dashboard/**'
              - 'plugins/wp-labs-sdlc/skills/scaffolding-sdlc/templates/claude/session-dashboard.html'
            bash-tests:
              - '**/test-*'
              - '**/*.test.sh'
              - '**/*.jq'
            python:
              - '**/*.py'
              - '**/pyproject.toml'

  python-lint:
    name: Python lint & typecheck
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: Lint & typecheck all Python projects
        run: |
          find . -name pyproject.toml \
            -not -path '*/templates/*' \
            -not -path '*/.venv/*' \
            -not -path '*/.claude/*' \
            | sort \
            | while read -r f; do
                dir=$(dirname "$f")
                echo "::group::$dir"
                (cd "$dir" && uv sync --locked && uv run ruff check && uv run mypy .)
                echo "::endgroup::"
              done

  python-test:
    name: Python tests (non-Playwright)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: Test all non-Playwright Python projects
        run: |
          find . -name pyproject.toml \
            -not -path '*/templates/*' \
            -not -path '*/.venv/*' \
            -not -path '*/.claude/*' \
            | sort \
            | while read -r f; do
                grep -q playwright "$f" && continue
                dir=$(dirname "$f")
                echo "::group::$dir"
                (cd "$dir" && uv sync --locked && uv run pytest)
                echo "::endgroup::"
              done

  html-lint:
    name: HTML/JS lint (session-dashboard)
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    defaults:
      run:
        working-directory: plugins/wp-labs-sdlc/skills
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: plugins/wp-labs-sdlc/skills/package-lock.json
      - run: npm ci
      - run: npm run lint

  dashboard:
    name: Playwright (session-dashboard)
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    defaults:
      run:
        working-directory: plugins/wp-labs-sdlc/skills/session-dashboard/tests
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run playwright install chromium --with-deps
      - run: uv run pytest

  bash-tests:
    name: Bash tests
    needs: changes
    if: needs.changes.outputs.bash-tests == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - name: Run all bash test scripts
        run: |
          find . \( -name '*.test.sh' -o -name 'test-*' \) \
            -type f -not -name '*.md' \
            -not -path './.claude/*' \
            -not -path './feature/*' \
            -not -path '*/templates/*' \
            -not -path '*/.venv/*' \
            | sort \
            | while read -r f; do
                echo "::group::$f"
                bash "$f"
                echo "::endgroup::"
              done
