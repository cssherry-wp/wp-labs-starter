version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      npm-production:
        dependency-type: "production"
      npm-development:
        dependency-type: "development"
  - package-ecosystem: "pip"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      pip-production:
        dependency-type: "production"
      pip-development:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      actions:
        patterns: ["*"]
