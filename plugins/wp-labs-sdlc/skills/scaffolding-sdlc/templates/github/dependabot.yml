# The `npm` and `pip` update blocks below are conditional: the scaffolder
# (SKILL.md step 5) removes `npm` when no TypeScript/JavaScript is detected and
# `pip` when no Python is detected. The `github-actions` block always stays.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      npm-production:
        dependency-type: "production"
      npm-development:
        dependency-type: "development"
  - package-ecosystem: "pip"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      pip-production:
        dependency-type: "production"
      pip-development:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      actions:
        patterns: ["*"]
