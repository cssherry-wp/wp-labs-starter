# The `npm` and `uv` update blocks below are conditional: the scaffolder
# (SKILL.md step 5) removes `npm` when no TypeScript/JavaScript is detected and
# the Python block when no Python is detected. The Python block defaults to the
# `uv` ecosystem; switch it to `pip` when the repo already pins with pip
# (requirements.txt / Pipfile / setup.py and no uv.lock). The `github-actions`
# block always stays.
#
# Grouping: minor/patch bumps ride together in one auto-mergeable PR per
# ecosystem; majors get their own PR. Dependabot gates a group's automerge on
# its highest update-type, so isolating majors keeps the patch/minor group
# mergeable by dependabot-automerge.yml.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      npm-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: "uv" # switch to "pip" if the repo already pins with pip
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      python-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: ["dependencies"]
    groups:
      actions-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
