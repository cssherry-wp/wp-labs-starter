name: CI (infra)

# Only runs when Bicep under infra/ changes — no skipped-step noise on unrelated PRs.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths: ['infra/**']
  push:
    branches: [main]
    paths: ['infra/**']

jobs:
  bicep-lint:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      # ubuntu-latest ships the Azure CLI; `az bicep build` (run by make lint-infra)
      # auto-installs the bundled Bicep CLI on first use, so no explicit install step.
      - name: Lint Bicep (local == CI)
        run: make lint-infra
