name: Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  secrets:
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: read }
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      node: ${{ steps.check.outputs.node }}
      python: ${{ steps.check.outputs.python }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          [ -f package-lock.json ] && echo "node=true" >> "$GITHUB_OUTPUT" || echo "node=false" >> "$GITHUB_OUTPUT"
          [ -f pyproject.toml ] && echo "python=true" >> "$GITHUB_OUTPUT" || echo "python=false" >> "$GITHUB_OUTPUT"

  npm-audit:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - name: npm audit
        # Non-blocking: warn on findings rather than failing the workflow.
        run: |
          if npm audit --audit-level=high; then
            echo "✅ npm audit: no high-severity advisories" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::npm audit found high-severity advisories (non-blocking — see log above)"
            echo "⚠️ npm audit: high-severity advisories found — see job log" >> "$GITHUB_STEP_SUMMARY"
          fi

  pip-audit:
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - name: pip-audit
        # Non-blocking: warn on findings rather than failing the workflow.
        run: |
          if pipx run pip-audit; then
            echo "✅ pip-audit: no known vulnerabilities" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::pip-audit reported vulnerabilities (non-blocking — see log above)"
            echo "⚠️ pip-audit: vulnerabilities reported — see job log" >> "$GITHUB_STEP_SUMMARY"
          fi

  semgrep:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    container: { image: returntocorp/semgrep }
    steps:
      - uses: actions/checkout@v5
      - name: semgrep
        # Non-blocking, but surface the outcome rather than swallowing it with `|| true`.
        run: |
          if semgrep ci; then
            echo "✅ semgrep: no findings" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::semgrep reported findings or errored (non-blocking — see log above)"
            echo "⚠️ semgrep: findings or error — see job log" >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
