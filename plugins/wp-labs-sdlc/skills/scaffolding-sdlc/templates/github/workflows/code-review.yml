name: Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# No permissions by default; each job requests only the minimum it needs.
permissions: {}

jobs:
  # Job A — runs the agent on untrusted PR content. Its token is read-only, so it can
  # neither push nor comment. It produces an autofix patch + a findings file as an
  # artifact for the privileged job to act on. The agent runs ONLY in this job.
  review:
    # Same-repo PRs only: fork PRs get no secrets (the agent can't run) and can't push.
    # Fork PRs are reviewed by a human, not by this workflow.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'no-automation')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required by claude-code-action to mint its OIDC token (grants no repo write)
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          # Pin to the immutable head SHA, not the mutable branch name: the review and
          # apply jobs run at different times, so both must see the exact same commit or
          # the patch (built in review) may apply to the wrong tree in apply.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect autofix commit
        id: detect
        run: |
          SUBJECT="$(git log -1 --pretty=%s)"
          if printf '%s' "$SUBJECT" | grep -q '^\[autofix\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run change-review (read-only — produces findings + patch, never pushes)
        if: steps.detect.outputs.skip == 'false'
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The action accepts only a plain marketplace Git URL — it does NOT honor an
          # @<sha>/@<tag> ref (that fails with "Invalid marketplace URL format"). Supply-chain
          # trust therefore relies on branch-protecting this marketplace repo's default branch.
          plugin_marketplaces: 'https://github.com/cssherry-wp/wp-labs-starter.git'
          plugins: 'wp-labs-standards@wp-labs-starter'
          prompt: |
            /wp-labs-standards:change-review --ci --fix --effort high
            Review the changes in this pull request against its base branch.
            Apply ONLY high-confidence, mechanically-fixable findings to the working tree.
            Do NOT commit, push, or post any PR comment. Write ALL findings to
            change-review-findings.json in the repository root, following the CI findings
            JSON schema in the change-review skill: line-anchored findings (path+line inside
            the diff) go in findings[] with status "fixed" or "unfixed"; everything else goes
            in unanchored[] (with a category). Give every finding a "summary" (one-line
            headline), and add "detail" and "suggestion" when useful — do not use a single
            "body" field. Always write the file, even if there are no findings.
            Also set a top-level "report_markdown" field to the full prose report (every section
            plus the verdict) so the complete review renders at the top of the PR comment.
          # Write is required so the agent can CREATE change-review-findings.json (a new file);
          # Edit only modifies existing files. The job token is read-only, so Write only touches
          # the ephemeral working tree — no repo-write power. (Bash, already allowed, could create
          # the file too, so Write adds no net capability.)
          claude_args: '--allowedTools "Read,Grep,Glob,Edit,Write,Skill,Bash" --disallowedTools "Bash(git push:*),Bash(git commit:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr merge:*)"'

      - name: Package patch and findings
        if: steps.detect.outputs.skip == 'false'
        run: |
          OUT="$RUNNER_TEMP/cr"
          mkdir -p "$OUT"
          echo "## change-review — PR #${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"
          # The skill is instructed to ALWAYS write the findings file (even "no findings"),
          # so a MISSING file means the agent did not complete — do not disguise that as a
          # clean "no findings" result the way a silent fallback would.
          if [ -f change-review-findings.json ] && jq empty change-review-findings.json 2>/dev/null; then
            COUNT=$(jq '(.findings | length) + (.unanchored | length)' change-review-findings.json)
            mv change-review-findings.json "$OUT/change-review-findings.json"
            echo "- findings file: present (${COUNT} finding(s))" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::change-review-findings.json missing or invalid — the agent may not have completed; check the 'Run change-review' step log."
            printf '{"reviewed":"","report_markdown":"⚠️ change-review did not produce a valid findings file — the agent may not have completed. Check the workflow run log.","findings":[],"unanchored":[]}' > "$OUT/change-review-findings.json"
            echo "- findings file: **MISSING/INVALID** (agent may not have completed)" >> "$GITHUB_STEP_SUMMARY"
          fi
          git add -A
          git diff --cached > "$OUT/autofix.patch" || true
          CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
          echo "- autofix patch: ${CHANGED} file(s) changed" >> "$GITHUB_STEP_SUMMARY"
          if [ "$CHANGED" -gt 0 ]; then
            echo "::group::autofix patch (diffstat)"
            git diff --cached --stat
            echo "::endgroup::"
          fi

      - name: Upload review artifact
        if: steps.detect.outputs.skip == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: change-review-${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/cr/
          retention-days: 1

  # Job B — privileged and deterministic. No agent, no execution of PR code. It applies
  # the vetted patch and posts the findings comment, nothing else.
  apply:
    needs: review
    if: needs.review.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          # Pin to the immutable head SHA, not the mutable branch name: the review and
          # apply jobs run at different times, so both must see the exact same commit or
          # the patch (built in review) may apply to the wrong tree in apply.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Download review artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: change-review-${{ github.event.pull_request.number }}
          path: cr

      - name: Post inline review and resolve fixed threads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MARKER: '<!-- claude-autofix -->'
          COMMIT_ID: ${{ github.event.pull_request.head.sha }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          FINDINGS="cr/change-review-findings.json"
          if [ ! -s "$FINDINGS" ]; then
            echo "::warning::no findings file to post."
            echo "- review: NOT posted (empty/missing findings file)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Build the reviews-API payload deterministically (no agent). The .jq helper is
          # scaffolded next to this workflow, so it is present after checkout.
          jq -f .github/workflows/build-review-payload.jq \
             --arg commit_id "$COMMIT_ID" --arg marker "$MARKER" \
             "$FINDINGS" > payload.json

          # One review = one pull_request_review event (skipped by triage via the marker
          # in the body). The reviews API is all-or-nothing: if any inline line is outside
          # the diff it 422s, so fall back to a body-only review.
          if gh api -X POST "repos/$REPO/pulls/$PR/reviews" --input payload.json >/dev/null 2>posterr; then
            echo "::notice::posted inline review to PR #$PR"
            echo "- review: posted with $(jq '.comments | length' payload.json) inline comment(s)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::inline review rejected ($(cat posterr | head -1)); retrying body-only."
            jq '.comments = []' payload.json > payload-body.json
            gh api -X POST "repos/$REPO/pulls/$PR/reviews" --input payload-body.json >/dev/null
            echo "- review: posted body-only (inline comments rejected — likely a line outside the diff)" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Resolve threads whose seed comment carries the marker (the auto-fixed findings).
          OWNER="${REPO%/*}"; NAME="${REPO#*/}"
          gh api graphql -f query="
          query {
            repository(owner: \"$OWNER\", name: \"$NAME\") {
              pullRequest(number: $PR) {
                reviewThreads(first: 100) {
                  nodes { id isResolved comments(first: 1) { nodes { body } } }
                }
              }
            }
          }" | jq -r --arg m "$MARKER" \
            '.data.repository.pullRequest.reviewThreads.nodes[]
             | select(.isResolved | not)
             | select(.comments.nodes[0].body | contains($m)) | .id' \
          | while read -r tid; do
              [ -n "$tid" ] || continue
              gh api graphql -f query="mutation { resolveReviewThread(input: { threadId: \"$tid\" }) { thread { isResolved } } }" >/dev/null
              echo "- resolved auto-fixed thread $tid" >> "$GITHUB_STEP_SUMMARY"
            done

      - name: Apply autofix patch and push
        # head.ref is attacker-controlled (PR author names the branch) and git allows
        # shell metacharacters in ref names. Pass it via env so the shell — not Actions
        # templating — expands it, as a single quoted argv to git push (no injection).
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -s cr/autofix.patch ]; then
            if git apply --index cr/autofix.patch; then
              git -c user.name='change-review[bot]' \
                  -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                  commit --no-verify -m "[autofix] change-review high-confidence fixes"
              git push origin "HEAD:$HEAD_REF"
              echo "::notice::applied autofix and pushed to $HEAD_REF"
              echo "- autofix: applied and pushed to \`$HEAD_REF\`" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::autofix patch did not apply cleanly; skipping."
              echo "- autofix: patch did NOT apply cleanly — skipped" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "::notice::no autofix patch to apply."
            echo "- autofix: no patch to apply" >> "$GITHUB_STEP_SUMMARY"
          fi
