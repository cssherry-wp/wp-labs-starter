name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      node: ${{ steps.filter.outputs.node }}
      frontend: ${{ steps.filter.outputs.frontend }}
      python: ${{ steps.filter.outputs.python }}
      styles: ${{ steps.filter.outputs.styles }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - 'package*.json'
              - '!app/**'
            frontend:
              - 'app/frontend/**'
            python:
              - 'app/**/*.py'
              - 'app/pyproject.toml'
              - 'app/requirements*.txt'
            styles:
              - '**/*.css'
              - '**/*.scss'
              - '**/*.sass'
            code:
              - '**'
              - '!**/*.md'

  # Root-level Node/TypeScript project (package-lock.json at repo root).
  node:
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - id: detect
        run: |
          if [ -f package-lock.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "✅ root Node: package-lock.json found — running lint + typecheck + coverage" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No root package-lock.json; skipping root Node jobs."
            echo "⏭️ root Node: no package-lock.json — skipped" >> "$GITHUB_STEP_SUMMARY"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v5
        with: { node-version: 20, cache: npm }
      - if: steps.detect.outputs.present == 'true'
        run: npm ci
      - if: steps.detect.outputs.present == 'true'
        run: make lint
      - if: steps.detect.outputs.present == 'true'
        run: make typecheck
      - if: steps.detect.outputs.present == 'true'
        run: make coverage
      - if: steps.detect.outputs.present == 'true'
        run: pip install --quiet "diff-cover>=9,<10"
      - if: steps.detect.outputs.present == 'true'
        run: make diff-cover

  # Nested app/frontend/ npm project (fullstack: Django at root of app/, React in app/frontend/).
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    defaults: { run: { working-directory: app/frontend } }
    steps:
      - uses: actions/checkout@v5
      - id: detect
        working-directory: .
        run: |
          if [ -f app/frontend/package.json ] && [ ! -f package-lock.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "✅ app/frontend/: npm project found — running lint + typecheck + coverage" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No app/frontend/ project; skipping."
            echo "⏭️ app/frontend/: no npm project — skipped" >> "$GITHUB_STEP_SUMMARY"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v5
        with: { node-version: 20, cache: npm, cache-dependency-path: app/frontend/package-lock.json }
      - if: steps.detect.outputs.present == 'true'
        run: npm ci
      - if: steps.detect.outputs.present == 'true'
        run: npm run lint
      - if: steps.detect.outputs.present == 'true'
        run: npm run typecheck
      - if: steps.detect.outputs.present == 'true'
        run: npm run coverage
      - if: steps.detect.outputs.present == 'true'
        run: pip install --quiet "diff-cover>=9,<10"
      - if: steps.detect.outputs.present == 'true'
        run: diff-cover coverage/lcov.info --compare-branch=origin/main --fail-under=90

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - id: detect
        run: |
          if [ -f app/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "✅ Python: app/pyproject.toml found — running check + typecheck + coverage" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No app/pyproject.toml; skipping Python jobs."
            echo "⏭️ Python: no app/pyproject.toml — skipped" >> "$GITHUB_STEP_SUMMARY"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: astral-sh/setup-uv@v5
      - if: steps.detect.outputs.present == 'true'
        run: make check-python
      - if: steps.detect.outputs.present == 'true'
        run: make typecheck-python
      - if: steps.detect.outputs.present == 'true'
        run: make coverage-python
      - if: steps.detect.outputs.present == 'true'
        run: make diff-cover-python

  # CSS/SCSS/Sass linting — runs independently of the JS/TS build.
  stylelint:
    needs: changes
    if: needs.changes.outputs.styles == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - name: Run stylelint where configured
        run: |
          if [ -f app/frontend/package.json ]; then DIR=app/frontend;
          elif [ -f package.json ]; then DIR=.;
          else
            echo "::notice::No package.json with stylelint; skipping."
            echo "⏭️ stylelint: no npm project — skipped" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "✅ stylelint: npm project found in '$DIR' — running lint:css" >> "$GITHUB_STEP_SUMMARY"
          cd "$DIR"
          npm ci
          npm run lint:css

  e2e:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 20 }
      - name: Run Playwright e2e where configured
        run: |
          if [ -f app/frontend/playwright.config.ts ]; then DIR=app/frontend;
          elif [ -f playwright.config.ts ]; then DIR=.;
          else
            echo "::notice::No Playwright config; skipping e2e."
            echo "⏭️ e2e: no playwright.config.ts — skipped" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "✅ e2e: Playwright config found in '$DIR' — running tests" >> "$GITHUB_STEP_SUMMARY"
          cd "$DIR"
          npm ci
          npx playwright install --with-deps
          npx playwright test
