name: Deploy — Production rollback

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type ROLLBACK to confirm"
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    if: ${{ vars.AZURE_WEBAPP_NAME != '' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.AZURE_WEBAPP_URL }}
    steps:
      - name: Validate confirmation
        run: |
          [ "${{ inputs.confirm }}" = "ROLLBACK" ] || { echo "❌ Type ROLLBACK to confirm"; exit 1; }

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Reverses the last deploy swap — restores the version sitting in prod-staging.
      - name: Swap prod-staging → production (rollback)
        run: |
          az webapp deployment slot swap \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --slot prod-staging \
            --target-slot production

      - name: Health check
        run: |
          url="${{ vars.AZURE_WEBAPP_URL }}/api/status/"
          for i in $(seq 1 18); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            [ "$code" = "200" ] && echo "✅ production healthy after rollback ($code)" && exit 0
            echo "attempt $i: $code — waiting…"
            sleep 10
          done
          echo "❌ health check failed — both slots may be bad; investigate manually" && exit 1

      - name: Azure logout
        if: always()
        run: az logout
