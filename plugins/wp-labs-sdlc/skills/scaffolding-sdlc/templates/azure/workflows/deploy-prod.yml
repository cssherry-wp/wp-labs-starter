name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy (default: main)"
        required: false
        default: main

# Shares the same concurrency group as rollback — they cannot run concurrently.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ vars.AZURE_WEBAPP_NAME != '' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.AZURE_WEBAPP_URL }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ inputs.ref }}" }

      - name: Resolve release SHA
        id: sha
        run: echo "value=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Frontend build (remove/adapt if no frontend) ─────────────────────
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_APP_ENV: production
          VITE_SENTRY_RELEASE: ${{ steps.sha.outputs.value }}
          # Add project-specific VITE_* vars here from vars.* or secrets.*
      # ─────────────────────────────────────────────────────────────────────

      - name: Package artifact
        run: |
          zip -r deploy.zip . \
            --exclude ".git/*" "node_modules/*" "frontend/node_modules/*" \
            "__pycache__/*" ".pytest_cache/*" "*.pyc" \
            ".env" ".venv/*" ".DS_Store"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy to the prod-staging slot first — health-check before swap.
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: prod-staging
          package: deploy.zip

      - name: Stamp release on slot (travels with swap)
        run: |
          az webapp config appsettings set \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --slot prod-staging \
            --slot-setting false \
            --settings RELEASE="${{ steps.sha.outputs.value }}"

      - name: Health check on slot
        run: |
          url="${{ vars.AZURE_WEBAPP_URL_PROD_STAGING }}/api/status/"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            [ "$code" = "200" ] && echo "✅ slot healthy ($code)" && exit 0
            echo "attempt $i: $code — waiting…"
            sleep 10
          done
          echo "❌ slot health check timed out — aborting before swap" && exit 1

      - name: Swap prod-staging → production
        run: |
          az webapp deployment slot swap \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --slot prod-staging \
            --target-slot production

      - name: Health check on production
        run: |
          url="${{ vars.AZURE_WEBAPP_URL }}/api/status/"
          for i in $(seq 1 18); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            [ "$code" = "200" ] && echo "✅ production healthy ($code)" && exit 0
            echo "attempt $i: $code — waiting…"
            sleep 10
          done
          echo "❌ production health check failed — previous version is in prod-staging slot; re-swap to rollback" && exit 1

      - name: Azure logout
        if: always()
        run: az logout
